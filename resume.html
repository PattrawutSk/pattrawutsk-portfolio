<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Full Resume — Pattrawut Sukkaew</title>
  <meta name="description" content="Full resume of Pattrawut Sukkaew — coming soon." />

  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="shortcut icon" href="favicon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />

  <style>
  :root {
    --bg:         #0a0f1e;
    --text:       #ccd6f6;
    --white:      #e6f1ff;
    --muted:      #8892b0;
    --faint:      #4a5568;
    --accent:     #1D6FE8;
    --accent-dim: rgba(29,111,232,0.08);
    --sans: 'Inter', 'San Francisco', 'Segoe UI', system-ui, sans-serif;
    --mono: 'SF Mono', 'Fira Code', 'Fira Mono', 'Roboto Mono', monospace;
    --ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { overflow-x: hidden; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-weight: 300;
    line-height: 1.7;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  a { color: inherit; text-decoration: none; }

  .placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 18px;
    max-width: 480px;
    width: 100%;
    padding: 56px 32px;
    border: 1px dashed rgba(255,255,255,0.10);
    border-radius: 16px;
    animation: fadeUp 0.5s var(--ease) both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .placeholder svg { color: rgba(29,111,232,0.55); }

  .placeholder-title {
    font-size: clamp(20px, 4vw, 26px);
    font-weight: 600;
    color: var(--white);
    letter-spacing: -0.02em;
  }
  .placeholder-text {
    font-size: 15px;
    color: var(--muted);
    line-height: 1.8;
    max-width: 360px;
  }
  .placeholder-note {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--faint);
    letter-spacing: 0.06em;
    margin-top: 2px;
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    margin-top: 10px;
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    border: 1px solid rgba(29,111,232,0.35);
    padding: 9px 20px;
    border-radius: 8px;
    transition: background 0.22s, border-color 0.22s, transform 0.22s;
  }
  .back-link:hover {
    background: var(--accent-dim);
    border-color: rgba(29,111,232,0.6);
    transform: translateY(-1px);
  }
  .back-link svg { transition: transform 0.22s; }
  .back-link:hover svg { transform: translateX(-2px); }
  </style>
</head>
<body>
  <main class="placeholder">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
    </svg>
    <h1 class="placeholder-title">Full Resume Coming Soon</h1>
    <p class="placeholder-text">I'm currently preparing and updating the content. Please check back later.</p>
    <a href="index.html" class="back-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Back to Portfolio
    </a>
  </main>
</body>
</html>
